<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8">
  <title>Wedding Invitation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🎬 Intro Screen -->
<div id="intro">
  <h1>💖 Wedding Invitation 💖</h1>
  <button onclick="startExperience()">Tap to Open</button>
</div>

<!-- 💌 Main Card -->
<div class="overlay" id="mainContent" style="display:none;">
  <div class="card">

    <h1 id="welcome"></h1>

    <h2 class="names glow">💍 Bikesh Yadav ❤️ Barsa Kumari Yadav 💍</h2>

    <p class="date">📅 2083 बैशाख 30 गते</p>

    <p id="message"></p>

    <div class="slideshow">
      <img id="slide" src="photo1.jpeg">
    </div>

  </div>
</div>

<canvas id="effects"></canvas>

<audio id="bgMusic" loop>
  <source src="music.mpeg" type="audio/mpeg">
</audio>

<audio id="voice">
  <source src="voice.mpeg" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
